   <h1 class = "display-1 text-success text-center fw-bold" >Expense Tracker</h1>

  <form onSubmit="handleFormSubmit(event)">

    <label for='expense'>Choose ExpenseAmount:</label><br><br>
    <input type='text' name='expense' id='expense' title="Enter ExpenseAmount" class="border border-4 border-success" required>
    </input><br><br>

    <br><br>
    <label for='category'>Choose category:</label><br><br>
    <select name = "category" id = 'category' title="Choose category" class="border border-4 border-success" required>
        <option>Entertainment</option>
        <option>Electricity</option>
        <option>Fuel</option>
        <option>Others</option>
    </select>
  </div>
  
    <br><br>
    <label>
        <button type='submit' class="btn btn-primary border border-4 border-success" title="Click to add Expense">Add Expense</button>
     </label>
